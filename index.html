<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Mundial 2026 - Calendário</title>
    <style>
        /* Design Premium */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; }
        .container { max-width: 1000px; margin: auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .lang-switch { cursor: pointer; color: #2b6cb0; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a365d; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .tag { background: #e2e8f0; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="title">🏆 Mundial 2026</h1>
        <div class="lang-switch">
            <span onclick="setLang('pt')">PT</span> | <span onclick="setLang('en')">EN</span>
        </div>
    </div>
    
    <table>
        <thead>
            <tr><th>Data</th><th>Jogo</th><th>Grupo</th><th>Hora</th><th>Canais</th></tr>
        </thead>
        <tbody id="tabela-jogos"></tbody>
    </table>
</div>

<script src="jogos.js?v=1.0.0"></script>
<script>
    function renderTable() {
        const tbody = document.getElementById('tabela-jogos');
        tbody.innerHTML = JOGOS_MUNDIAL.map(j => `
            <tr>
                <td>${j.date}</td>
                <td>${j.match}</td>
                <td><span class="tag">${j.group}</span></td>
                <td>${j.time}</td>
                <td>${j.broadcaster}</td>
            </tr>
        `).join('');
    }

    function setLang(lang) {
        document.getElementById('title').innerText = (lang === 'pt') ? "🏆 Mundial 2026" : "🏆 World Cup 2026";
    }

    renderTable();
</script>
</body>
</html>
