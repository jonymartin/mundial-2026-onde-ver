function buildTable(matches) {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    matches.forEach(item => {
        const row = document.createElement("tr");
        if (item.match.includes("Portugal")) {
            row.className = "highlight-pt";
        }
        row.innerHTML = `
            <td>${item.date}</td>
            <td>${item.match}</td>
            <td>${item.group}</td>
            <td><span class="badge time-badge">${item.time}</span></td>
            <td>${item.TV}</td>
        `;
        tableBody.appendChild(row);
    });
}

function filterTable() {
    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();
    let table = document.getElementById("matchTable");
    let tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
        let showRow = false;
        let tds = tr[i].getElementsByTagName("td");
        for (let j = 0; j < tds.length; j++) {
            if (tds[j] && tds[j].innerText.toLowerCase().indexOf(filter) > -1) {
                showRow = true;
                break;
            }
        }
        tr[i].style.display = showRow ? "" : "none";
    }
}
