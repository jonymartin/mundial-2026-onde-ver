<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde Ver o Mundial 2026 - Guia de Transmissão Portugal</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #104E3B;
            --accent-color: #1B7343;
            --bg-color: #f7faf8;
            --text-dark: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Seletor de Língua */
        .lang-selector {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
            transition: background 0.3s;
        }

        .lang-selector:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lang-selector option {
            color: var(--text-dark);
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 25px auto;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ccc;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }

        th, td {
            padding: 14px 18px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background-color: #f1f5f2;
        }

        .badge {
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .time-badge {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            header { padding: 40px 15px 20px 15px; }
            .lang-selector { top: 10px; right: 10px; padding: 4px 8px; font-size: 0.85rem; }
            header h1 { font-size: 1.4rem; }
            th, td { padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <select class="lang-selector" id="langSelect" onchange="changeLanguage()">
        <option value="pt">PT 🇵🇹</option>
        <option value="en">EN 🇬🇧</option>
    </select>
    <h1 id="mainTitle">🏆 Mundial 2026 - Onde Ver em Portugal</h1>
    <p id="subTitle">Guia completo por ordem estrita de transmissão (Hora de Portugal Continental)</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Pesquise por país, grupo ou canal...">
</div>

<div class="table-container">
    <table id="matchTable">
        <thead>
            <tr>
                <th id="thDate">Data</th>
                <th id="thMatch">Jogo</th>
                <th id="thGroup">Grupo</th>
                <th id="thTime">Hora (PT)</th>
                <th id="thTV">Canais de Transmissão</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>
