            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Seletor de Língua */
        .lang-selector {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
            transition: background 0.3s;
        }

        .lang-selector:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lang-selector option {
            color: var(--text-dark);
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 25px auto;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ccc;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }

        th, td {
            padding: 14px 18px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background-color: #f1f5f2;
        }

        .highlight-pt {
            background-color: var(--card-pt) !important;
            font-weight: bold;
        }

        .badge {
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .time-badge {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            header { padding: 40px 15px 20px 15px; }
            .lang-selector { top: 10px; right: 10px; padding: 4px 8px; font-size: 0.85rem; }
            header h1 { font-size: 1.4rem; }
            th, td { padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>

let currentLang = "pt";

function buildTable(matches) {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    matches.forEach(item => {
        const row = document.createElement("tr");
        
        // Mantém o destaque visual para os jogos de Portugal em qualquer idioma
        if (item.match.pt.includes("Portugal")) {
            row.className = "highlight-pt";
        }
        
        row.innerHTML = `
            <td>${item.date[currentLang]}</td>
            <td>${item.match[currentLang]}</td>
            <td>${item.group[currentLang]}</td>
            <td><span class="badge time-badge">${item.time}</span></td>
            <td>${item.TV}</td>
        `;
        tableBody.appendChild(row);
    });
}

function changeLanguage() {
    currentLang = document.getElementById("langSelect").value;
    
    // Atualiza os textos estruturais da página
    document.getElementById("mainTitle").innerText = translations[currentLang].title;
    document.getElementById("subTitle").innerText = translations[currentLang].subtitle;
    document.getElementById("searchInput").placeholder = translations[currentLang].placeholder;
    document.getElementById("thDate").innerText = translations[currentLang].thDate;
    document.getElementById("thMatch").innerText = translations[currentLang].thMatch;
    document.getElementById("thGroup").innerText = translations[currentLang].thGroup;
    document.getElementById("thTime").innerText = translations[currentLang].thTime;
    document.getElementById("thTV").innerText = translations[currentLang].thTV;
    
    // Reconstrói a tabela com os dados na língua correta e preserva qualquer filtro ativo
    buildTable(mundialMatches);
    filterTable();
}

function filterTable() {
    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();
    let table = document.getElementById("matchTable");
    let tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
        let showRow = false;
        let tds = tr[i].getElementsByTagName("td");
        for (let j = 0; j < tds.length; j++) {
            if (tds[j] && tds[j].innerText.toLowerCase().indexOf(filter) > -1) {
                showRow = true;
                break;
            }
        }
        tr[i].style.display = showRow ? "" : "none";
    }
}

// Inicialização padrão
window.onload = function() {
    buildTable(mundialMatches);
};
