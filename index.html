<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Mundial 2026 - Calendário</title>
    <style>
        /* Estilo limpo da primeira versão */
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f4f4f4; }
        
        /* Tags de Canais com Cores */
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; color: white; display: inline-block; }
        .tvi { background-color: #e53935; }
        .sic { background-color: #fbc02d; color: black; }
        .rtp { background-color: #1976d2; }
        .sporttv { background-color: #388e3c; }
        .livemode { background-color: #d32f2f; }
        
        .disclaimer { margin-top: 30px; font-size: 0.85em; color: #666; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div id="top-bar">
    <button onclick="changeLang('pt')">Português</button> 
    <button onclick="changeLang('en')">English</button>
</div>

<h1 id="title">Calendário Mundial 2026</h1>

<table id="tabela-jogos">
    <thead><tr><th>Data</th><th>Jogo</th><th>Grupo</th><th>Hora</th><th>Canais</th></tr></thead>
    <tbody></tbody>
</table>

<div class="disclaimer">
    <p>Nota: Os horários e canais podem sofrer alterações. Consulte o guia oficial da FIFA para confirmação.</p>
    <p>© 2026 - Guia de Visualização Mundial 2026</p>
</div>

<script src="jogos.js"></script>
<script>
    function getChannelClass(name) {
        if (name.includes('TVI')) return 'tvi';
        if (name.includes('SIC')) return 'sic';
        if (name.includes('RTP')) return 'rtp';
        if (name.includes('Sport TV')) return 'sporttv';
        if (name.includes('LiveMode')) return 'livemode';
        return '';
    }

    function renderTable() {
        const tbody = document.querySelector('#tabela-jogos tbody');
        tbody.innerHTML = JOGOS_MUNDIAL.map(j => {
            const canais = j.broadcaster.split('/').map(c => {
                const clean = c.trim();
                if (clean.includes('LiveMode')) {
                    return `<a href="https://www.youtube.com/@LiveMode" target="_blank" class="tag ${getChannelClass(clean)}">${clean}</a>`;
                }
                return `<span class="tag ${getChannelClass(clean)}">${clean}</span>`;
            }).join('');
            
            return `<tr><td>${j.date}</td><td>${j.match}</td><td>${j.group}</td><td>${j.time}</td><td>${canais}</td></tr>`;
        }).join('');
    }

    function changeLang(lang) {
        if(lang === 'en') {
            document.getElementById('title').innerText = "2026 World Cup Schedule";
        } else {
            document.getElementById('title').innerText = "Calendário Mundial 2026";
        }
    }
    
    renderTable();
</script>
</body>
</html>
